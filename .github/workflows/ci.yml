name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - docs/runtime-probe-docs
      - 'release/**'
      - 'hotfix/**'
    paths:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'crates/**'
      - 'benches/**'
      - 'scripts/**'
      - 'docs/PERF_BASELINE.json'
      - 'docs/PERF_BASELINE_STRESS.json'
      - 'README.md'
      - 'TESTING.md'
      - 'docs/SECURITY_MODEL.md'
      - '.github/workflows/ci.yml'
      - '.github/workflows/production-gate.yml'
      - '.github/workflows/security.yml'
      - '.github/workflows/release-artifacts.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'crates/**'
      - 'benches/**'
      - 'scripts/**'
      - 'docs/PERF_BASELINE.json'
      - 'docs/PERF_BASELINE_STRESS.json'
      - 'README.md'
      - 'TESTING.md'
      - 'docs/SECURITY_MODEL.md'
      - '.github/workflows/ci.yml'
      - '.github/workflows/production-gate.yml'
      - '.github/workflows/security.yml'
      - '.github/workflows/release-artifacts.yml'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  doctor-preflight:
    name: Doctor Preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Validate tracked GUI Python config defaults
        run: |
          python3 scripts/validate_gui_python_config.py

      - name: Run doctor strict with JSON report
        run: |
          mkdir -p ./tmp
          cargo run -p ghost-link -- doctor --strict --json ./tmp/doctor-report.json

      - name: Validate doctor JSON context
        run: |
          python3 scripts/validate_doctor_context.py \
            --report ./tmp/doctor-report.json \
            --allow-missing-gui-modules \
            --allow-headless

      - name: Run doctor accessibility probe with JSON report
        run: |
          python3 -m http.server 18765 --bind 127.0.0.1 >/tmp/ghostlink_doctor_probe_server.log 2>&1 &
          SERVER_PID=$!
          trap 'kill ${SERVER_PID}' EXIT

          for _ in $(seq 1 20); do
            if python3 -c 'import socket; s=socket.socket(); s.settimeout(0.2); rc=s.connect_ex(("127.0.0.1", 18765)); s.close(); raise SystemExit(0 if rc == 0 else 1)'
            then
              break
            fi
            sleep 0.1
          done

          cargo run -p ghost-link -- doctor --json ./tmp/doctor-network-probe-report.json \
            --network-probe --network-target localhost:18765

      - name: Validate doctor network-probe context
        run: |
          python3 scripts/validate_doctor_context.py \
            --report ./tmp/doctor-network-probe-report.json \
            --allow-missing-gui-modules \
            --allow-headless \
            --require-network-probe

      - name: Summarize doctor reports
        run: |
          python3 scripts/summarize_doctor_report.py \
            --report ./tmp/doctor-report.json \
            --output ./tmp/doctor-report-summary.md
          python3 scripts/summarize_doctor_report.py \
            --report ./tmp/doctor-network-probe-report.json \
            --output ./tmp/doctor-network-probe-summary.md

      - name: Publish doctor summaries to job summary
        run: |
          {
            echo "## Doctor Preflight Summary"
            echo
            cat ./tmp/doctor-report-summary.md
            echo
            echo "## Doctor Accessibility Probe Summary"
            echo
            cat ./tmp/doctor-network-probe-summary.md
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload doctor report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: doctor-report
          path: |
            ./tmp/doctor-report.json
            ./tmp/doctor-network-probe-report.json
            ./tmp/doctor-report-summary.md
            ./tmp/doctor-network-probe-summary.md
          retention-days: 14

  license-consistency:
    name: License Consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate workspace/crate license alignment
        run: bash scripts/check_license_consistency.sh

  mock-surface-guard:
    name: Mock Surface Guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Enforce no mock-only phrasing in production surfaces
        run: |
          if grep -RInE "Mock response from|will be replaced with live streaming" \
            crates scripts \
            --include='*.rs' --include='*.py'; then
            echo "Found mock-only text in production surfaces."
            exit 1
          fi

  docs:
    name: Docs
    uses: ./.github/workflows/docs.yml

  perf-tooling-smoke:
    name: Perf Tooling Smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Drift Checker Schema Smoke
        run: |
          mkdir -p ./tmp
          python3 - <<'PY'
          import json
          from pathlib import Path

          baseline = json.loads(Path("./docs/PERF_BASELINE.json").read_text(encoding="utf-8"))
          modes = baseline.get("modes", {})
          summary = {
              mode: {
                  "throughput_avg": float(values["throughput_avg"]),
                  "p95_avg": float(values["p95_avg"]),
              }
              for mode, values in modes.items()
          }

          Path("./tmp/perf-summary-smoke.json").write_text(
              json.dumps(summary, indent=2),
              encoding="utf-8",
          )
          PY

          python3 scripts/check_perf_drift.py \
            --baseline ./docs/PERF_BASELINE.json \
            --current ./tmp/perf-summary-smoke.json

  production-gate:
    name: Production Gate
    uses: ./.github/workflows/production-gate.yml

  security:
    name: Security
    uses: ./.github/workflows/security.yml

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install tarpaulin
        run: cargo install cargo-tarpaulin --version 0.31.5 --locked

      - name: Generate coverage report
        run: |
          cargo tarpaulin --workspace --out Lcov --output-dir coverage \
            --timeout 300 --exclude-files benches/* --fail-under 35

      - name: Verify coverage artifact
        run: |
          test -s ./coverage/lcov.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage/lcov.info
          use_oidc: true
          fail_ci_if_error: false
          verbose: true

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30
