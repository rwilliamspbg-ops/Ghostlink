name: Lint

on:
  workflow_call:
  workflow_dispatch:
  push:
    branches:
      - main
      - docs/runtime-probe-docs
      - 'release/**'
      - 'hotfix/**'
    paths:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'crates/**'
      - 'benches/**'
      - '.github/workflows/lint.yml'
  pull_request:
    branches: [main]
    paths:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'crates/**'
      - 'benches/**'
      - '.github/workflows/lint.yml'

env:
  CARGO_TERM_COLOR: always

jobs:
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings
