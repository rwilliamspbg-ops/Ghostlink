name: Benchmarks

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - docs/runtime-probe-docs
      - 'release/**'
      - 'hotfix/**'
    paths:
      - 'Cargo.toml'
      - 'crates/ghostlink-core/Cargo.toml'
      - 'crates/ghostlink-core/src/**'
      - 'benches/**'
      - '.github/workflows/benchmarks.yml'
  pull_request:
    branches: [main]
    paths:
      - 'Cargo.toml'
      - 'crates/ghostlink-core/Cargo.toml'
      - 'crates/ghostlink-core/src/**'
      - 'benches/**'
      - '.github/workflows/benchmarks.yml'

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: benchmarks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  criterion:
    name: Run Criterion benchmarks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run Criterion benchmarks
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          cargo bench -p ghostlink-core --bench criterion -- --warm-up-time 1 --measurement-time 1 | tee artifacts/criterion.log

      - name: Summarize benchmark estimates
        shell: bash
        run: |
          python3 scripts/summarize_criterion_report.py \
            --criterion-root target/criterion \
            --output artifacts/criterion-summary.json

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: criterion-benchmarks
          path: |
            artifacts/criterion.log
            artifacts/criterion-summary.json
            target/criterion
          retention-days: 14