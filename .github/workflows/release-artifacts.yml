name: Release Artifacts

'on':
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-release-artifacts:
    name: Build Release Artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Validate release tag format
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          set -euo pipefail
          [[ "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9._-]+)?$ ]]

      - name: Require signing key configuration
        shell: bash
        env:
          GPG_PRIVATE_KEY: ${{ secrets.RELEASE_GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.RELEASE_GPG_PASSPHRASE }}
        run: |
          set -euo pipefail
          test -n "${GPG_PRIVATE_KEY}"
          test -n "${GPG_PASSPHRASE}"

      - name: Import GPG key
        shell: bash
        env:
          GPG_PRIVATE_KEY: ${{ secrets.RELEASE_GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.RELEASE_GPG_PASSPHRASE }}
        run: |
          set -euo pipefail
          printf '%s' "$GPG_PRIVATE_KEY" | gpg --batch --import
          echo "pinentry-mode loopback" >> ~/.gnupg/gpg.conf
          echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
          gpgconf --kill gpg-agent

      - name: Build release bundle
        env:
          GPG_PASSPHRASE: ${{ secrets.RELEASE_GPG_PASSPHRASE }}
        run: bash scripts/release_bundle.sh ./artifacts/release

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: ./artifacts/release/ghost-link
          format: spdx-json
          output-file: ./artifacts/release/sbom.spdx.json

      - name: Attest release artifact provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: ./artifacts/release/ghost-link

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ghost-link-release
          path: artifacts/release/
          retention-days: 30
