name: Production Gate

on:
  workflow_call:
  workflow_dispatch:
  push:
    branches:
      - main
      - docs/runtime-probe-docs
      - 'release/**'
      - 'hotfix/**'
    paths:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'crates/**'
      - 'scripts/**'
      - 'docs/PERF_BASELINE.json'
      - 'docs/PERF_BASELINE_STRESS.json'
      - 'README.md'
      - 'TESTING.md'
      - '.github/workflows/production-gate.yml'
  pull_request:
    branches: [main]
    paths:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'crates/**'
      - 'scripts/**'
      - 'docs/PERF_BASELINE.json'
      - 'docs/PERF_BASELINE_STRESS.json'
      - 'README.md'
      - 'TESTING.md'
      - '.github/workflows/production-gate.yml'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

concurrency:
  group: production-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  production-gate:
    name: Production Gate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2

      - name: Rust Source Parse Check
        run: |
          find crates -name '*.rs' -print0 | xargs -0 -n1 rustfmt --check --edition 2021

      - name: Format
        run: cargo fmt --all --check

      - name: Lint
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Tests
        run: cargo test --workspace --verbose

      - name: GUI API Contract Check
        run: python3 scripts/validate_gui_api_contract.py

      - name: Doctor JSON (Strict)
        run: |
          cargo run -p ghost-link -- doctor --strict --json ./tmp/doctor-report.json

      - name: Validate Doctor JSON Context
        run: |
          python3 scripts/validate_doctor_context.py \
            --report ./tmp/doctor-report.json \
            --allow-headless \
            --allow-missing-gui-modules

      - name: Summarize Doctor JSON
        run: |
          python3 scripts/summarize_doctor_report.py \
            --report ./tmp/doctor-report.json \
            --output ./tmp/doctor-report-summary.md

      - name: XDP/eBPF Preflight Signals
        run: |
          python3 scripts/xdp_preflight_check.py --output ./tmp/xdp-preflight.json

      - name: Create tmp directory
        run: mkdir -p ./tmp

      - name: GUI Diagnostics JSON
        run: |
          GHOSTLINK_GUI_DIAG_JSON=./tmp/gui-diagnostics.json \
          cargo run -p ghost-link -- gui-diagnose

      - name: Validate GUI Diagnostics JSON
        run: |
          python3 scripts/validate_gui_diagnostics.py \
            --report ./tmp/gui-diagnostics.json \
            --allow-headless \
            --allow-missing-python-modules \
            --require-python-source

      - name: Summarize GUI Diagnostics
        run: |
          python3 scripts/summarize_gui_diagnostics.py \
            --report ./tmp/gui-diagnostics.json \
            --output ./tmp/gui-diagnostics-summary.md

      - name: GUI Dashboard Smoke (Headless)
        run: |
          QT_QPA_PLATFORM=offscreen xvfb-run -a ./.venv/bin/python third_party/mohawk_gui/test_dashboard.py | tee ./tmp/gui-dashboard-smoke.txt

      - name: Summarize GUI Dashboard Smoke
        run: |
          python3 scripts/summarize_gui_dashboard_smoke.py \
            --input ./tmp/gui-dashboard-smoke.txt \
            --output ./tmp/gui-dashboard-smoke-summary.md

      - name: Publish GUI diagnostics summary to job summary
        run: |
          {
            echo "## GUI Diagnostics Summary"
            echo
            cat ./tmp/gui-diagnostics-summary.md
            echo
            echo "## GUI Dashboard Smoke"
            echo
            cat ./tmp/gui-dashboard-smoke-summary.md
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Runtime Smoke (TCP)
        env:
          GHOSTLINK_TCP_MAX_INFLIGHT: "32"
          GHOSTLINK_TCP_RECONNECT_ATTEMPTS: "3"
          GHOSTLINK_TCP_RECONNECT_BACKOFF_MS: "10"
          GHOSTLINK_TCP_AUTH_TOKEN: "ci-production-gate-token"
          GHOSTLINK_FLOW_METRICS_JSON: ./tmp/flow-metrics-tcp.json
        run: |
          mkdir -p ./tmp
          cargo run --release -p ghost-link -- flow iprada-16gb zenbook-32gb 32 32 128 4 tcp

      - name: Validate Runtime SLO (TCP)
        run: |
          python3 scripts/validate_flow_metrics.py \
            --file ./tmp/flow-metrics-tcp.json \
            --transport tcp \
            --profile production

      - name: Runtime Smoke (In-Memory)
        env:
          GHOSTLINK_FLOW_METRICS_JSON: ./tmp/flow-metrics-inmem.json
        run: |
          mkdir -p ./tmp
          cargo run --release -p ghost-link -- flow iprada-16gb zenbook-32gb 32 32 128 4 inmem

      - name: Validate Runtime SLO (In-Memory)
        run: |
          python3 scripts/validate_flow_metrics.py \
            --file ./tmp/flow-metrics-inmem.json \
            --transport inmem \
            --profile production

      - name: Validate Runtime Metrics Schema Contract
        run: |
          python3 scripts/validate_flow_metrics_schema_contract.py \
            --tcp-file ./tmp/flow-metrics-tcp.json \
            --inmem-file ./tmp/flow-metrics-inmem.json

      - name: Fault Matrix (Quick)
        env:
          GHOSTLINK_TCP_AUTH_TOKEN: "ci-production-gate-token"
        run: |
          python3 scripts/fault_injection_matrix.py \
            --output-dir ./tmp/fault_matrix_ci \
            --exec-tokens 96 \
            --micro-batch 4 \
            --strict \
            --max-p95-ms 40.0

      - name: Active Network Probe (Loopback)
        run: |
          python3 -m http.server 18765 --bind 127.0.0.1 >/tmp/ghostlink_probe_server.log 2>&1 &
          SERVER_PID=$!
          trap 'kill ${SERVER_PID}' EXIT

          for _ in $(seq 1 20); do
            if python3 -c 'import socket; s=socket.socket(); s.settimeout(0.2); rc=s.connect_ex(("127.0.0.1", 18765)); s.close(); raise SystemExit(0 if rc == 0 else 1)'
            then
              break
            fi
            sleep 0.1
          done

          python3 scripts/active_network_probe.py \
            --target 127.0.0.1:18765 \
            --timeout-ms 500 \
            --max-failure-ratio 0.0 \
            --output ./tmp/active-probe.json

      - name: Summarize Active Network Probe
        run: |
          python3 scripts/summarize_active_probe.py \
            --report ./tmp/active-probe.json \
            --output ./tmp/doctor-probe-summary.md

      - name: Upload Runtime Metrics Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: flow-runtime-metrics
          path: |
            ./tmp/flow-metrics-*.json
            ./tmp/fault_matrix_ci/
            ./tmp/active-probe.json
            ./tmp/gui-diagnostics.json
            ./tmp/gui-diagnostics-summary.md
            ./tmp/gui-dashboard-smoke.txt
            ./tmp/gui-dashboard-smoke-summary.md
            ./tmp/xdp-preflight.json
            ./tmp/doctor-report.json
            ./tmp/doctor-report-summary.md
            ./tmp/doctor-probe-summary.md
          retention-days: 14

      - name: Perf Snapshot (Deterministic)
        env:
          GHOSTLINK_TCP_AUTH_TOKEN: "ci-production-gate-token"
          GHOSTLINK_TCP_MAX_INFLIGHT: "512"
        run: |
          python3 scripts/flow_perf_snapshot.py \
            --warmup-runs 1 \
            --runs 3 \
            --release \
            --output-dir ./tmp/perf_snapshot_ci

      - name: Perf Drift Check
        run: |
          python3 scripts/check_perf_drift.py \
            --baseline ./docs/PERF_BASELINE.json \
            --current ./tmp/perf_snapshot_ci/summary.json

      - name: Stage Tail Gate (TCP deterministic)
        run: |
          python3 scripts/validate_stage_tail_metrics.py \
            --glob './tmp/perf_snapshot_ci/tcp-*.json' \
            --pctl 0.95 \
            --max-bridge-read-ms 0.30 \
            --max-bridge-write-ms 0.10 \
            --max-recv-wait-ms 0.30 \
            --max-send-wait-ms 0.12

      - name: Canary Guardrails (Deterministic)
        run: |
          python3 scripts/validate_flow_canary.py \
            --summary ./tmp/perf_snapshot_ci/summary.json \
            --profile production

      - name: Perf Snapshot (Stress)
        env:
          GHOSTLINK_TCP_AUTH_TOKEN: "ci-production-gate-token"
          GHOSTLINK_TCP_MAX_INFLIGHT: "512"
        run: |
          python3 scripts/flow_perf_snapshot.py \
            --warmup-runs 1 \
            --runs 4 \
            --modes tcp inmem \
            --exec-tokens 512 \
            --micro-batch 8 \
            --release \
            --output-dir ./tmp/perf_snapshot_stress_ci

      - name: Perf Drift Check (Stress)
        run: |
          python3 scripts/check_perf_drift.py \
            --baseline ./docs/PERF_BASELINE_STRESS.json \
            --current ./tmp/perf_snapshot_stress_ci/summary.json

      - name: Stage Tail Gate (TCP stress)
        run: |
          python3 scripts/validate_stage_tail_metrics.py \
            --glob './tmp/perf_snapshot_stress_ci/tcp-*.json' \
            --pctl 0.95 \
            --max-bridge-read-ms 0.35 \
            --max-bridge-write-ms 0.12 \
            --max-recv-wait-ms 0.35 \
            --max-send-wait-ms 0.15

      - name: Canary Guardrails (Stress)
        run: |
          python3 scripts/validate_flow_canary.py \
            --summary ./tmp/perf_snapshot_stress_ci/summary.json \
            --profile stress

      - name: Summarize Production Gate Artifacts
        run: |
          python3 scripts/summarize_production_gate.py \
            --doctor-summary ./tmp/doctor-report-summary.md \
            --doctor-probe-summary ./tmp/doctor-probe-summary.md \
            --gui-summary ./tmp/gui-diagnostics-summary.md \
            --gui-smoke-summary ./tmp/gui-dashboard-smoke-summary.md \
            --active-probe ./tmp/active-probe.json \
            --xdp-preflight ./tmp/xdp-preflight.json \
            --perf-deterministic ./tmp/perf_snapshot_ci/summary.json \
            --perf-stress ./tmp/perf_snapshot_stress_ci/summary.json \
            --fail-on-fail \
            --verdict-json ./tmp/production-gate-verdict.json \
            --output ./tmp/production-gate-summary.md

      - name: Validate Production Gate Verdict Schema
        run: |
          python3 scripts/validate_production_gate_verdict.py \
            --file ./tmp/production-gate-verdict.json

      - name: Smoke Test Verdict Validator Fixtures
        run: |
          bash scripts/smoke_validate_production_gate_verdict.sh

      - name: Publish production gate summary to job summary
        run: |
          {
            echo "## Gate Verdict"
            echo
            awk '/^## Gate Verdict/{flag=1; next} /^## Operational Snapshot/{flag=0} flag' ./tmp/production-gate-summary.md
            echo
            echo "## Production Gate Summary"
            echo
            cat ./tmp/production-gate-summary.md
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Perf Snapshot Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: flow-perf-snapshot
          path: |
            ./tmp/perf_snapshot_ci/
            ./tmp/perf_snapshot_stress_ci/
            ./tmp/production-gate-summary.md
            ./tmp/production-gate-verdict.json
          retention-days: 14
