name: HF Model Verify

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  verify-hf-model-downloads:
    name: Verify Hugging Face model downloads
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install --upgrade pip huggingface_hub

      - name: Verify model listing and download
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python scripts/verify_hf_models.py
