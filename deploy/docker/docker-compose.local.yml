services:
  ghostlink-node-a:
    image: rust:1.88-bookworm
    working_dir: /workspace
    volumes:
      - ../../:/workspace
    command: ["bash", "-lc", "cargo run -p ghost-link -- listen node-a --once"]

  ghostlink-node-b:
    image: rust:1.88-bookworm
    working_dir: /workspace
    volumes:
      - ../../:/workspace
    command: ["bash", "-lc", "cargo run -p ghost-link -- listen node-b --once"]

  ghostlink-controller:
    image: rust:1.88-bookworm
    working_dir: /workspace
    depends_on:
      - ghostlink-node-a
      - ghostlink-node-b
    volumes:
      - ../../:/workspace
    command: ["bash", "-lc", "sleep 2 && cargo run -p ghost-link -- join controller"]
